; PHP runtime limits for high-resolution portfolio image uploads.
; On cPanel (PHP-FPM / CGI) this file is read from the document root (public/).
; If your host ignores .user.ini, set the same values via MultiPHP INI Editor.

upload_max_filesize = 30M
post_max_size = 32M
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
